name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web App
        run: npm run build
        
      - name: Sync Capacitor
        run: |
          npx cap sync android
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          wrapper-validation-enabled: false

      - name: Build APK
        run: |
          cd android
          # Use the system-installed gradle to regenerate the wrapper if needed
          gradle wrapper --gradle-version 8.2.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Khdmat-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
