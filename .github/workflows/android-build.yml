name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web App
        run: npm run build
        
      - name: Sync Capacitor
        run: |
          npx cap sync android
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7
          validate-wrappers: false

      - name: Build APK
        run: |
          cd android
          # Use the gradle version provided by setup-gradle
          gradle assembleDebug --no-daemon
          
      - name: Get SHA-1 Fingerprint
        run: |
          cd android
          gradle signingReport --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Khdmat-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

